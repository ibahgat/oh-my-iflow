description = "Quick toggle: set cmi HUD visibility profile to compact."
prompt = """
Set cmi HUD visibility profile to `compact`.

Protocol:
1. Apply `visibility = compact`.
2. If filesystem tools are available, write/update `.cmi/state/hud.json` with source `cmi:hud-compact`.
3. Provide one-line compact HUD preview and recommended follow-up command.

Output format:
## HUD
- applied: compact
- persisted:

## Preview
```text
[cmi][MODE balanced][STAGE team-exec][TASKS 3/8][NEXT /cmi:team-verify]
```

## Next Command
- /cmi:status
"""
