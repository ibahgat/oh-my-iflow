description = "Run a task intent gate to classify the request and route to the right cmi stage/command."
prompt = """
Run cmi `intent` gate.

Input:
$ARGUMENTS

Protocol:
1. Classify the primary intent into one:
   - plan
   - prd
   - exec
   - verify
   - fix
   - research
   - lifecycle
2. Identify missing constraints or acceptance criteria needed before execution.
3. Detect command-intent mismatch (for example, implementation request but planning stage is missing).
4. Recommend the next cmi command and agent handoff.
5. If filesystem tools are available, write/update `.cmi/state/intent.md`.

Routing hints:
- planning ambiguity -> `/cmi:team-plan`
- scope ambiguity -> `/cmi:team-prd`
- implementation-ready -> `/cmi:team-exec`
- validation request -> `/cmi:team-verify`
- defect-only fix -> `/cmi:team-fix`
- option research -> `$research`
- mode/lifecycle operations -> `/cmi:mode`, `/cmi:launch`, `/cmi:checkpoint`, `/cmi:stop`

Output format:
## Intent Gate
- primary intent:
- confidence:
- command-intent mismatch: yes/no

## Missing Inputs
- ...

## Recommended Route
- next command:
- delegate agents:

## Ready-to-Run Prompt
- ...
"""
