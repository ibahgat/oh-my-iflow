description = "Run the full cmi staged team pipeline for a complex task."
prompt = """
Coordinate the request with cmi agents.

Task:
$ARGUMENTS

Execution protocol (staged):
1. `team-plan`: Delegate decomposition to `cmi-planner` and architecture checks to `cmi-architect`.
2. `team-prd`: Delegate scope lock and acceptance criteria to `cmi-product`.
3. `team-exec`: Delegate implementation slices to `cmi-executor`.
4. `team-verify`: Delegate validation to `cmi-reviewer` and `cmi-verifier`.
5. `team-fix`: If verification fails, delegate root-cause and patches to `cmi-debugger` + `cmi-executor`.
6. Repeat steps 3-5 until acceptance criteria pass or blockers are explicit.
7. Return one merged lifecycle report.

State handling:
- If filesystem tools are available, update `.cmi/state/workflow.md` with stage status and open blockers.
- Keep verification evidence concise (tests, checks, reasoning).

Final report format:
## Pipeline Summary
- Active mode:
- Current stage:
- Completion status:

## Team Plan
- ...

## Stage Results
- team-plan:
- team-prd:
- team-exec:
- team-verify:
- team-fix:

## Work Completed
- ...

## Validation
- ...

## Open Items
- ...
"""
