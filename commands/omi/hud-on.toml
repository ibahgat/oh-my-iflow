description = "Quick toggle: set cmi HUD visibility profile to normal."
prompt = """
Set cmi HUD visibility profile to `normal`.

Protocol:
1. Apply `visibility = normal`.
2. If filesystem tools are available, write/update `.cmi/state/hud.json` with source `cmi:hud-on`.
3. Provide one-line HUD preview and recommended follow-up command.

Output format:
## HUD
- applied: normal
- persisted:

## Preview
```text
[cmi][MODE balanced][STAGE team-exec][TASKS 3/8][RISKS 1][NEXT /cmi:team-verify]
```

## Next Command
- /cmi:status
"""
