description = "Quick toggle: set cmi HUD visibility profile to hidden."
prompt = """
Set cmi HUD visibility profile to `hidden`.

Protocol:
1. Apply `visibility = hidden`.
2. If filesystem tools are available, write/update `.cmi/state/hud.json` with source `cmi:hud-off`.
3. Confirm that future `/cmi:status` calls should avoid visual HUD code blocks.

Output format:
## HUD
- applied: hidden
- persisted:

## Effect
- `/cmi:status` should return plain sections without HUD code block.

## Next Command
- /cmi:status
"""
